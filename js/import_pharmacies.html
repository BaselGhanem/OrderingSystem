<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تحديث قاعدة بيانات الصيدليات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; padding: 50px; text-align: center; background-color: #f1f5f9; color: #1e293b; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 600px; margin: auto; }
        .btn { padding: 12px 25px; background: #004a99; color: white; border: none; cursor: pointer; border-radius: 8px; font-size: 1rem; font-weight: bold; margin-top: 15px; transition: 0.3s;}
        .btn:hover { background: #003a7a; }
        input[type="file"] { padding: 10px; border: 1px solid #ccc; border-radius: 8px; width: 100%; margin-top: 15px;}
        #status { margin-top: 20px; font-size: 1.1rem; font-weight: bold; }
        .info-box { background: #e0f2fe; padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: right; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="color: #004a99;">تحديث قائمة الصيدليات المطور</h2>
        
        <div class="info-box">
            <strong>ملاحظة هامة:</strong> يجب أن يحتوي ملف الإكسل على الأعمدة التالية تماماً:
            <br>
            (Name, rep_id, pharmacy_code, Supervisor, Area)
        </div>

        <input type="file" id="excelFile" accept=".xlsx, .xls">
        <br>
        <button id="startImportBtn" class="btn">بدء تحديث قاعدة البيانات</button>
        <div id="status"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, deleteDoc, doc, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDSTrX3Y-jF4k7lBS1AApVHHZXTGmWjk-g",
            authDomain: "dad-ordering-system.firebaseapp.com",
            projectId: "dad-ordering-system",
            storageBucket: "dad-ordering-system.firebasestorage.app",
            messagingSenderId: "43886677849",
            appId: "1:43886677849:web:de5f80c06e1b743c948648"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('startImportBtn').onclick = async () => {
            const file = document.getElementById('excelFile').files[0];
            if (!file) return alert("الرجاء اختيار ملف إكسل أولاً");

            const status = document.getElementById('status');
            status.innerText = "جاري قراءة الملف...";
            status.style.color = "#f59e0b";

            const reader = new FileReader();
            reader.onload = async (e) => {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                const excelData = XLSX.utils.sheet_to_json(firstSheet);

                if(excelData.length === 0) {
                    status.innerText = "الملف فارغ أو الترويسة غير صحيحة!";
                    status.style.color = "red";
                    return;
                }

                try {
                    status.innerText = "جاري حذف الصيدليات القديمة...";
                    const snap = await getDocs(collection(db, "pharmacies"));
                    const deletePromises = [];
                    snap.forEach(d => {
                        deletePromises.push(deleteDoc(doc(db, "pharmacies", d.id)));
                    });
                    await Promise.all(deletePromises);

                    status.innerText = `جاري إضافة ${excelData.length} صيدلية جديدة...`;
                    const addPromises = [];
                    
                    excelData.forEach(row => {
                        // التحقق من الأعمدة المطلوبة (مع مراعاة حالة الأحرف في الإكسل)
                        if(row.Name && row.rep_id) {
                            addPromises.push(addDoc(collection(db, "pharmacies"), {
                                name: String(row.Name).trim(),
                                rep_id: String(row.rep_id).trim(),
                                pharmacy_code: String(row.pharmacy_code || "-").trim(),
                                supervisor: String(row.Supervisor || "-").trim(),
                                area: String(row.Area || "-").trim()
                            }));
                        }
                    });

                    await Promise.all(addPromises);
                    
                    status.innerText = "✅ تم التحديث بنجاح مع كافة البيانات الإضافية!";
                    status.style.color = "#10b981";
                } catch (error) {
                    console.error("Error during import:", error);
                    status.innerText = "❌ حدث خطأ أثناء التحديث.";
                    status.style.color = "red";
                }
            };
            reader.readAsArrayBuffer(file);
        };
    </script>
</body>
</html>
