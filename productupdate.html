<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>إدارة وتحديث منتجات Firebase</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { 
            font-family: 'Cairo', sans-serif; 
            padding: 30px; 
            background-color: #f8fafc; 
            color: #0f172a; 
            margin: 0;
        }
        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 16px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            max-width: 1200px; 
            margin: auto; 
        }
        h2 { color: #1e3a8a; margin-top: 0; font-weight: 800; }
        
        .section-title {
            text-align: right;
            color: #475569;
            font-size: 1.2rem;
            margin-top: 30px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 8px;
        }

        /* أدوات التحكم والملفات */
        .upload-box {
            background: #f1f5f9;
            padding: 20px;
            border-radius: 12px;
            border: 2px dashed #cbd5e1;
            margin-bottom: 25px;
        }
        input[type="file"] { 
            padding: 10px; 
            background: white;
            border: 1px solid #cbd5e1; 
            border-radius: 8px; 
            width: 80%; 
            max-width: 400px;
        }

        /* الأزرار */
        .btn { 
            padding: 10px 20px; 
            background: #2563eb; 
            color: white; 
            border: none; 
            cursor: pointer; 
            border-radius: 8px; 
            font-size: 0.95rem; 
            font-weight: bold; 
            transition: 0.2s;
            font-family: 'Cairo', sans-serif;
            margin: 2px;
        }
        .btn:hover { background: #1d4ed8; }
        .btn-success { background: #10b981; }
        .btn-success:hover { background: #059669; }
        .btn-danger { background: #ef4444; }
        .btn-danger:hover { background: #dc2626; }
        .btn-sm { padding: 6px 12px; font-size: 0.85rem; }

        #status { margin: 15px 0; font-weight: bold; font-size: 1rem; }

        /* الجدول الخاص بالمنتجات */
        .table-container {
            overflow-x: auto;
            margin-top: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            text-align: right;
        }
        th, td {
            padding: 14px 16px;
            border-bottom: 1px solid #e2e8f0;
            vertical-align: middle;
        }
        th {
            background-color: #1e3a8a;
            color: white;
            font-weight: 700;
        }
        tr:hover { background-color: #f8fafc; }
        
        /* حقول الإدخال داخل الجدول */
        .table-input {
            width: 100%;
            padding: 8px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-family: 'Cairo', sans-serif;
            box-sizing: border-box;
            font-size: 0.9rem;
        }
        .table-input:focus {
            border-color: #2563eb;
            outline: none;
            background-color: #f0fdf4;
        }
        .doc-id-text {
            font-family: monospace;
            color: #64748b;
            font-size: 0.85rem;
        }
        .loading-text {
            padding: 20px;
            color: #64748b;
            font-style: italic;
        }


        /* Responsive safety layer */
        html { width: 100%; max-width: 100%; overflow-x: hidden; -webkit-text-size-adjust: 100%; }
        *, *::before, *::after { box-sizing: border-box; }
        body { width: 100%; max-width: 100%; overflow-x: hidden; padding: clamp(10px, 3vw, 30px) !important; }
        .container { width: min(100%, 1280px) !important; max-width: 100% !important; padding: clamp(14px, 3vw, 30px) !important; }
        h2, .section-title, #status { overflow-wrap: anywhere; line-height: 1.55; }
        .upload-box { padding: clamp(12px, 2.5vw, 20px) !important; }
        input[type="file"] { width: 100% !important; max-width: 100% !important; font-size: 16px; }
        .btn, button, input, select, textarea { max-width: 100%; font-size: 16px; }
        .btn, button { min-height: 42px; white-space: normal; line-height: 1.35; }
        .table-container { width: 100%; max-width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .table-container::after { content: 'اسحب الجدول يميناً ويساراً لعرض باقي الأعمدة'; display: none; padding: 8px 10px; color: #64748b; font-size: .78rem; font-weight: 700; text-align: center; background: #f8fafc; border-top: 1px solid #e2e8f0; }
        table { min-width: max-content; }
        th, td { white-space: nowrap; }
        td:first-child, td:nth-child(2) { white-space: normal; min-width: 160px; max-width: 300px; }
        .table-input { min-width: 120px; }
        @media (max-width: 992px) {
            .table-container::after { display: block; }
        }
        @media (max-width: 768px) {
            body { padding: 8px !important; }
            .container { border-radius: 14px !important; }
            .btn { width: 100%; margin: 6px 0; }
            h2 { font-size: 1.15rem; }
        }

    </style>
</head>
<body>

    <div class="container">
        <h2>📦 نظام إدارة وتحديث المنتجات</h2>
        
        <div class="upload-box">
            <div style="font-weight: 600; margin-bottom: 10px;">تحديث شامل عبر ملف Excel:</div>
            <input type="file" id="excelFile" accept=".xlsx, .xls">
            <button id="startImportBtn" class="btn">رفع وتحديث الكل</button>
        </div>

        <div id="status"></div>

        <div class="section-title">قائمة المنتجات الحالية في قاعدة البيانات (يمكنك التعديل أو الحذف مباشرة)</div>
        
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th style="width: 20%;">Document_ID</th>
                        <th style="width: 25%;">اسم الصنف (name)</th>
                        <th style="width: 15%;">كود الصنف (code)</th>
                        <th style="width: 15%;">كود الصيدلية (pharmacyCode)</th>
                        <th style="width: 10%;">السعر (price)</th>
                        <th style="width: 15%; text-align: center;">إجراءات</th>
                    </tr>
                </thead>
                <tbody id="productsTableBody">
                    <tr>
                        <td colspan="6" class="loading-text">جاري تحميل المنتجات من قاعدة البيانات...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, deleteDoc, doc, setDoc, addDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDSTrX3Y-jF4k7lBS1AApVHHZXTGmWjk-g",
            authDomain: "dad-ordering-system.firebaseapp.com",
            projectId: "dad-ordering-system",
            storageBucket: "dad-ordering-system.firebasestorage.app",
            messagingSenderId: "43886677849",
            appId: "1:43886677849:web:de5f80c06e1b743c948648"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        function normalizeRowKeys(originalRow) {
            return Object.keys(originalRow || {}).reduce((acc, key) => {
                acc[String(key).trim()] = originalRow[key];
                return acc;
            }, {});
        }

        function makeSafeDocId(value, fallbackPrefix = `item`) {
            const cleaned = String(value || ``)
                .trim()
                .replace(/[\/\#?]/g, `-`)
                .replace(/\s+/g, `_`)
                .replace(/_+/g, `_`)
                .slice(0, 420);
            return cleaned || `${fallbackPrefix}_${Date.now()}`;
        }

        async function runInChunks(tasks, chunkSize = 100) {
            for (let i = 0; i < tasks.length; i += chunkSize) {
                const chunk = tasks.slice(i, i + chunkSize);
                await Promise.all(chunk.map(task => task()));
            }
        }

        function buildProductImportRows(excelData) {
            const usedIds = new Set();
            const validRows = [];
            const invalidRows = [];

            excelData.forEach((originalRow, index) => {
                const row = normalizeRowKeys(originalRow);
                const rowName = row.name || row.Name || row[`اسم الصنف`] || row[`الصنف`];
                const rowCode = row.code || row.Code || row.productCode || row.itemCode || row[`كود الصنف`];
                const rowPharmacyCode = row.pharmacyCode || row.pharmacy_code || row.PharmacyCode || row[`كود الصيدلية`];
                const rowPrice = row.price || row.Price || row[`السعر`];

                if (!rowName || !rowCode) {
                    invalidRows.push(index + 2);
                    return;
                }

                let excelPrice = Number(rowPrice) || 0;
                excelPrice = Number(excelPrice.toFixed(2));

                const productData = {
                    name: String(rowName).trim(),
                    code: String(rowCode).trim(),
                    productCode: String(rowCode).trim(),
                    itemCode: String(rowCode).trim(),
                    pharmacyCode: String(rowPharmacyCode || `-`).trim(),
                    price: excelPrice
                };

                let docId = row.Document_ID ? String(row.Document_ID).trim() : makeSafeDocId(`${productData.code}_${productData.name}`, `product`);
                docId = makeSafeDocId(docId, `product`);
                if (usedIds.has(docId)) docId = `${docId}_${index + 1}`;
                usedIds.add(docId);

                validRows.push({ docId, productData });
            });

            return { validRows, invalidRows };
        }

        // وظيفة جلب المنتجات وعرضها في الجدول فور فتح الصفحة
        async function loadProducts() {
            const tableBody = document.getElementById('productsTableBody');
            try {
                const snap = await getDocs(collection(db, "products"));
                tableBody.innerHTML = "";

                if (snap.empty) {
                    tableBody.innerHTML = `<tr><td colspan="6" class="loading-text">لا توجد منتجات حالياً في قاعدة البيانات.</td></tr>`;
                    return;
                }

                snap.forEach(pDoc => {
                    const data = pDoc.data();
                    const id = pDoc.id;
                    
                    // تحويل السعر لرقم عشري بخانتين فقط ليظهر بشكل منسق
                    const formattedPrice = data.price ? Number(data.price).toFixed(2) : "0.00";

                    const tr = document.createElement('tr');
                    tr.id = `row-${id}`;
                    tr.innerHTML = `
                        <td class="doc-id-text">${id}</td>
                        <td><input type="text" class="table-input" id="name-${id}" value="${data.name || ''}"></td>
                        <td><input type="text" class="table-input" id="code-${id}" value="${data.code || data.productCode || data.itemCode || ''}"></td>
                        <td><input type="text" class="table-input" id="pharmacyCode-${id}" value="${data.pharmacyCode || data.pharmacy_code || ''}" placeholder="اختياري"></td>
                        <td><input type="number" class="table-input" id="price-${id}" value="${formattedPrice}" step="0.01"></td>
                        <td style="text-align: center;">
                            <button class="btn btn-success btn-sm save-single-btn" data-id="${id}">حفظ</button>
                            <button class="btn btn-danger btn-sm delete-single-btn" data-id="${id}">حذف</button>
                        </td>
                    `;
                    tableBody.appendChild(tr);
                });

                // تفعيل أزرار الحفظ الفردية لكل سطر
                document.querySelectorAll('.save-single-btn').forEach(button => {
                    button.onclick = async (e) => {
                        const docId = e.target.getAttribute('data-id');
                        await updateSingleProduct(docId, e.target);
                    };
                });

                // تفعيل أزرار الحذف الفردية لكل سطر
                document.querySelectorAll('.delete-single-btn').forEach(button => {
                    button.onclick = async (e) => {
                        const docId = e.target.getAttribute('data-id');
                        await deleteSingleProduct(docId);
                    };
                });

            } catch (error) {
                console.error("Error loading products:", error);
                tableBody.innerHTML = `<tr><td colspan="6" style="color:red; padding:20px;">حدث خطأ أثناء تحميل البيانات!</td></tr>`;
            }
        }

        // وظيفة تحديث منتج فردي عند الضغط على زر حفظ الخاص به
        async function updateSingleProduct(id, buttonElement) {
            const nameVal = document.getElementById(`name-${id}`).value.trim();
            const codeVal = document.getElementById(`code-${id}`).value.trim();
            const pharmacyCodeVal = document.getElementById(`pharmacyCode-${id}`).value.trim();
            // جلب القيمة وتحويلها لرقم مقرب لـ 2 digits وعمل تنسيق لها
            let priceVal = Number(document.getElementById(`price-${id}`).value) || 0;
            priceVal = Number(priceVal.toFixed(2)); 

            if (!nameVal || !codeVal) {
                alert("لا يمكن ترك الاسم أو الكود فارغاً!");
                return;
            }

            const originalText = buttonElement.innerText;
            buttonElement.innerText = "جاري...";
            buttonElement.disabled = true;

            try {
                const productRef = doc(db, "products", id);
                await updateDoc(productRef, {
                    name: nameVal,
                    code: codeVal,
                    productCode: codeVal,
                    itemCode: codeVal,
                    pharmacyCode: pharmacyCodeVal || "-",
                    price: priceVal
                });
                localStorage.removeItem("dad_app_cache_v2");
                localStorage.removeItem("dad_app_cache_time_v2");
                
                // تحديث حقل المدخلات ليعرض الرقم منسقاً بخانتين عشريتين
                document.getElementById(`price-${id}`).value = priceVal.toFixed(2);

                buttonElement.innerText = "✅ تم";
                buttonElement.style.background = "#059669";
                
                setTimeout(() => {
                    buttonElement.innerText = originalText;
                    buttonElement.style.background = "#10b981";
                    buttonElement.disabled = false;
                }, 2000);

            } catch (error) {
                console.error("Error updating document: ", error);
                alert("حدث خطأ أثناء حفظ التعديل.");
                buttonElement.innerText = originalText;
                buttonElement.disabled = false;
            }
        }

        // وظيفة حذف المنتج نهائياً من Firestore ومن واجهة المستخدم
        async function deleteSingleProduct(id) {
            if (!confirm("هل أنت متأكد من رغبتك في حذف هذا الصنف نهائياً من قاعدة البيانات؟")) {
                return;
            }

            try {
                await deleteDoc(doc(db, "products", id));
                
                // إزالة السطر الخاص بالمنتج من الجدول مباشرة
                const row = document.getElementById(`row-${id}`);
                if (row) {
                    row.remove();
                }
                alert("تم حذف الصنف بنجاح.");
            } catch (error) {
                console.error("Error deleting document: ", error);
                alert("حدث خطأ أثناء محاولة الحذف.");
            }
        }

        // استدعاء دالة الجلب عند تحميل الصفحة مباشرة
        window.addEventListener('DOMContentLoaded', loadProducts);

        // معالجة ملف الإكسل المستورد بطريقة أكثر أماناً: فحص ثم رفع الجديد ثم حذف القديم
        document.getElementById('startImportBtn').onclick = async () => {
            const fileInput = document.getElementById('excelFile');
            const button = document.getElementById('startImportBtn');
            const file = fileInput.files[0];
            if (!file) return alert("الرجاء اختيار ملف إكسل أولاً");

            const status = document.getElementById('status');
            status.innerHTML = "جاري قراءة وفحص الملف...";
            status.style.color = "#f59e0b";

            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                    const excelData = XLSX.utils.sheet_to_json(firstSheet, { defval: "" });

                    if(excelData.length === 0) {
                        status.innerHTML = "❌ الملف فارغ أو الترويسة غير صحيحة! لم يتم حذف أي بيانات.";
                        status.style.color = "red";
                        return;
                    }

                    const { validRows, invalidRows } = buildProductImportRows(excelData);
                    if (validRows.length === 0) {
                        status.innerHTML = `❌ لم يتم العثور على أي صنف صالح.<br>يجب توفر اسم الصنف وكود الصنف. <b>لم يتم حذف أي بيانات قديمة.</b>`;
                        status.style.color = "red";
                        return;
                    }

                    const confirmMessage = `تم العثور على ${validRows.length} صنف صالح من أصل ${excelData.length} صف.
` +
                        `الصفوف غير الصالحة: ${invalidRows.length}.

` +
                        `سيتم أولاً رفع/تحديث المنتجات الجديدة، وبعد نجاح الرفع سيتم حذف المنتجات القديمة غير الموجودة في الملف.

هل تريد المتابعة؟`;

                    if (!confirm(confirmMessage)) {
                        status.innerHTML = "تم إلغاء العملية. لم يتم تعديل قاعدة البيانات.";
                        status.style.color = "#64748b";
                        return;
                    }

                    button.disabled = true;
                    fileInput.disabled = true;
                    button.innerText = "جاري التحديث...";

                    status.innerHTML = `جاري رفع/تحديث ${validRows.length} صنف جديد قبل حذف القديم...`;
                    status.style.color = "#004a99";

                    const newDocIds = new Set(validRows.map(row => row.docId));
                    const writeTasks = validRows.map(row => () => setDoc(doc(db, "products", row.docId), row.productData));
                    await runInChunks(writeTasks, 100);

                    status.innerHTML = "تم رفع المنتجات الجديدة بنجاح. جاري تنظيف المنتجات القديمة غير الموجودة في الملف...";
                    const snap = await getDocs(collection(db, "products"));
                    const deleteTasks = [];
                    snap.forEach(existingDoc => {
                        if (!newDocIds.has(existingDoc.id)) {
                            deleteTasks.push(() => deleteDoc(doc(db, "products", existingDoc.id)));
                        }
                    });
                    await runInChunks(deleteTasks, 100);

                    localStorage.removeItem("dad_app_cache_v2");
                    localStorage.removeItem("dad_app_cache_time_v2");
                    status.innerHTML = `✅ تم تحديث قاعدة المنتجات بنجاح.<br>تم رفع/تحديث ${validRows.length} صنف، وحذف ${deleteTasks.length} صنف قديم غير موجود في الملف.`;
                    status.style.color = "#10b981";
                    fileInput.value = "";
                    loadProducts();
                } catch (error) {
                    console.error("Error during import:", error);
                    status.innerHTML = "❌ حدث خطأ أثناء التحديث. إذا ظهر الخطأ قبل مرحلة الحذف فلن تكون البيانات القديمة قد حُذفت.";
                    status.style.color = "red";
                } finally {
                    button.disabled = false;
                    fileInput.disabled = false;
                    button.innerText = "رفع وتحديث الكل";
                }
            };
            reader.readAsArrayBuffer(file);
        };
    </script>
</body>
</html>
