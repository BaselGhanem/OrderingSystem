<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<link href="favicon.ico?v=20260621_review1" rel="icon"/>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, user-scalable=yes" name="viewport"/>
<title>Ziad / Zakaria Orders Staff | نظام الطلبيات</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/@phosphor-icons/web"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="style.css?v=20260621_review1" rel="stylesheet"/>
<meta content="no-cache, no-store, must-revalidate" http-equiv="Cache-Control"/>
<meta content="no-cache" http-equiv="Pragma"/>
<meta content="0" http-equiv="Expires"/>
</head>
<body data-page="orders-staff">
<div class="offline-banner" id="offline-banner"><i class="ph ph-wifi-slash"></i> أنت الآن في وضع عدم الاتصال.</div>
<div class="bg-shapes"><div class="shape shape-1"></div><div class="shape shape-2"></div></div>
<div class="app-container workflow-page-shell">
<header class="glass-panel workflow-header">
    <div class="logo-area"><img alt="Dar Al Dawaa Logo" class="logo" src="https://www.dadgroup.com/wp-content/uploads/2023/11/uplift-dad-website-05.png"/><div><h1>Orders Processing</h1><p>صفحة Ziad / Zakaria لتصدير الطلبيات المعتمدة مالياً</p></div></div>
</header>
<main class="glass-panel workflow-main">
    <section class="workflow-stats-grid"><div class="workflow-stat-card"><span>عدد الطلبيات</span><strong id="ordersCount">0</strong></div><div class="workflow-stat-card"><span>القيمة المعروضة</span><strong id="ordersValue">0.00 د.ا</strong></div></section>
    <section class="workflow-filters">
        <div><label>من تاريخ</label><input id="filterDateFrom" type="date"></div>
        <div><label>إلى تاريخ</label><input id="filterDateTo" type="date"></div>
        <div><label>الصيدلية</label><input id="filterPharmacy" type="search" placeholder="بحث بالصيدلية أو الكود"></div>
        <div><label>المندوب</label><input id="filterRepresentative" type="search" placeholder="بحث باسم المندوب"></div>
        <div><label>الصنف</label><input id="filterProduct" type="search" placeholder="بحث بالصنف أو كود المنتج"></div>
        <div><label>العرض</label><select id="showHiddenMode"><option value="active">الطلبيات الجديدة فقط</option><option value="exported">المصدّرة وغير المخفية</option><option value="hidden">المخفية بعد التصدير</option><option value="all">الكل</option></select></div>
    </section>
    <section class="workflow-toolbar">
        <button class="btn-success" id="exportSelectedBtn" type="button"><i class="ph ph-file-xls"></i> Export Selected</button>
        <button class="btn-secondary" id="exportVisibleBtn" type="button"><i class="ph ph-download-simple"></i> Export All Visible</button>
    </section>
    <div class="table-responsive workflow-table-wrap">
        <table class="order-table workflow-table">
            <thead><tr><th><input id="selectAllWorkflow" type="checkbox"></th><th>كود الصيدلية</th><th>الصيدلية</th><th>المندوب</th><th>كود المنتج</th><th>الصنف</th><th>الكمية</th><th>البونص</th><th>نسبة البونص</th><th>Subtotal</th><th>Grand Total</th><th>Item Note</th><th>Order Note</th></tr></thead>
            <tbody id="ordersStaffBody"><tr><td colspan="13"><div class="skeleton" style="height:40px;width:100%;"></div></td></tr></tbody>
        </table>
    </div>
</main>
</div>
<div id="toast-container"></div>
<script src="js/workflow.js?v=20260621_review1" type="module"></script>
</body>
</html>
