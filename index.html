<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الطلبيات | DAR ALDAWAA</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>

    <div class="app-container">
        <header class="glass-panel">
            <div class="logo-area">
                <img src="https://www.dadgroup.com/wp-content/uploads/2023/11/uplift-dad-website-05.png" alt="Dar Al Dawaa Logo" class="logo">
                <h1>نظام الطلبيات الذكي</h1>
            </div>
            <div class="user-info" id="userInfo" style="display: none;">
                <div class="tabs">
                    <button type="button" id="navOrderBtn" class="btn-tab active">طلب جديد</button>
                    <button type="button" id="navReportsBtn" class="btn-tab">التقارير</button>
                </div>
                <span id="currentRepName"><i class="ph ph-user"></i> المندوب: <b>-</b></span>
                <button type="button" id="logoutBtn" class="btn-icon" title="تسجيل خروج"><i class="ph ph-sign-out"></i></button>
            </div>
        </header>

        <main id="loginScreen" class="screen active glass-panel">
            <div class="auth-box">
                <i class="ph ph-shield-check auth-icon"></i>
                <h2>تسجيل الدخول للنظام</h2>
                <p>الرجاء تحديد هويتك والصيدلية لبدء الطلبية</p>
                <div class="input-group"><label>اسم المندوب</label><select id="repSelect" disabled><option>جاري التحميل...</option></select></div>
                <div class="input-group"><label>الصيدلية المستهدفة</label><select id="pharmacySelect" disabled><option>اختر المندوب أولاً...</option></select></div>
                <button type="button" id="startOrderBtn" class="btn-primary" disabled>بدء إدخال الطلبية <i class="ph ph-arrow-left"></i></button>
            </div>
        </main>

        <main id="orderScreen" class="screen glass-panel" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2>إدخال طلبية جديدة</h2>
                <h3 id="orderPharmacyName">اسم الصيدلية</h3>
            </div>
            <div class="table-responsive">
                <table class="order-table">
                    <thead>
                        <tr><th>الصنف</th><th>الكمية</th><th>البونص</th><th>السعر</th><th>المجموع</th><th>حذف</th></tr>
                    </thead>
                    <tbody id="orderBody"></tbody>
                </table>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 20px;">
                <button type="button" id="addRowBtn" class="btn-secondary"><i class="ph ph-plus-circle"></i> إضافة صنف</button>
                <div class="total-box">الإجمالي: <strong id="grandTotal">0.00</strong> د.أ</div>
            </div>
            <button type="button" id="submitOrderBtn" class="btn-primary" style="margin-top: 20px;"><i class="ph ph-paper-plane-tilt"></i> إرسال الطلبية</button>
        </main>

        <main id="reportsScreen" class="screen glass-panel" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2>سجل الطلبيات</h2>
                <button type="button" id="exportExcelBtn" class="btn-secondary" style="background:#107c41; color:white; border:none;"><i class="ph ph-file-xls"></i> تصدير للإكسل</button>
            </div>
            <div class="table-responsive">
                <table class="order-table" id="reportsTable">
                    <thead>
                        <tr><th>رقم المرجع</th><th>التاريخ</th><th>المندوب</th><th>الصيدلية</th><th>الإجمالي</th><th>الحالة</th><th>الإجراءات</th></tr>
                    </thead>
                    <tbody id="reportsBody"></tbody>
                </table>
            </div>
        </main>
    </div>

    <div id="detailsModal" class="modal-overlay" style="display: none;">
        <div class="modal-content glass-panel">
            <div class="modal-header">
                <h3>أصناف الطلبية</h3>
                <button type="button" class="close-modal" onclick="closeModal()"><i class="ph ph-x"></i></button>
            </div>
            <div class="table-responsive">
                <table class="order-table">
                    <thead><tr><th>الصنف</th><th>الكمية</th><th>البونص</th><th>السعر</th><th>المجموع</th></tr></thead>
                    <tbody id="modalItemsBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module" src="js/app.js?v=5"></script>
</body>
</html>
