<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#ffffff">
    <meta name="description" content="نظام الطلبيات DAR ALDAWAA v2.0">
    <title>نظام الطلبيات | DAR ALDAWAA v2.0</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web@2.0.2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text x='16' y='24' font-size='24' text-anchor='middle' fill='%230f3b5c'>📦</text></svg>">
    <link rel="stylesheet" href="style-v2.css">
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
</head>
<body>
    <div class="animated-bg">
        <div class="bg-gradient-1"></div>
        <div class="bg-gradient-2"></div>
        <div class="bg-gradient-3"></div>
    </div>

    <div id="offline-banner" class="offline-banner">
        <div class="offline-content">
            <i class="ph ph-wifi-slash"></i>
            <span>وضع بدون إنترنت - البيانات محفوظة محلياً</span>
        </div>
    </div>

    <div id="saving-indicator" class="saving-indicator">
        <div class="saving-spinner"></div>
        <span>جارٍ الحفظ...</span>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <div class="app-wrapper">
        <header class="app-header">
            <div class="header-content">
                <div class="logo-section">
                    <div class="logo-icon">📦</div>
                    <div>
                        <h1>نظام الطلبيات</h1>
                        <p class="version-badge">v2.0 محسّن</p>
                    </div>
                </div>
                <div class="header-actions" id="headerActions" style="display: none;">
                    <button class="btn-icon-header" id="logoutBtn" title="خروج">
                        <i class="ph ph-sign-out"></i>
                    </button>
                </div>
            </div>

            <div class="navigation-tabs" id="navTabs" style="display: none;">
                <button class="nav-tab active" data-screen="order-screen">
                    <i class="ph ph-plus-circle"></i> طلب جديد
                </button>
                <button class="nav-tab" data-screen="orders-screen">
                    <i class="ph ph-list-checks"></i> طلبياتي
                </button>
                <button class="nav-tab" data-screen="reports-screen">
                    <i class="ph ph-chart-line"></i> التقارير
                </button>
            </div>
        </header>

        <main class="app-main">
            <section id="login-screen" class="screen active">
                <div class="login-container">
                    <div class="login-welcome">
                        <div class="welcome-icon">🔐</div>
                        <h2>نظام الطلبيات v2.0</h2>
                        <p>واجهة محسّنة وسريعة</p>
                    </div>

                    <form class="login-form" onsubmit="return false;">
                        <div class="form-group">
                            <label>المندوب</label>
                            <select id="repSelect" required>
                                <option>جاري التحميل...</option>
                            </select>
                        </div>

                        <div class="form-group" id="repPasswordGroup" style="display:none;">
                            <label>كلمة المرور</label>
                            <input type="password" id="repPasswordInput" placeholder="••••••••">
                        </div>

                        <div class="form-group">
                            <label>الصيدلية</label>
                            <input type="text" id="pharmacyInput" placeholder="ابحث..." disabled>
                            <div id="pharmacySuggestions" class="autocomplete-list"></div>
                        </div>

                        <button type="button" id="startOrderBtn" class="btn-primary-large" disabled>
                            ابدأ الطلبية
                        </button>
                    </form>

                    <div class="login-footer">
                        <p>✨ أداء فائق • 🔒 آمن • 📱 سريع</p>
                    </div>
                </div>
            </section>

            <section id="order-screen" class="screen">
                <div class="order-container">
                    <div class="order-header-section">
                        <div class="order-meta">
                            <div class="meta-item">
                                <span class="meta-label">المندوب</span>
                                <span id="currentRepDisplay">-</span>
                            </div>
                            <div class="meta-item">
                                <span class="meta-label">الصيدلية</span>
                                <span id="currentPharmacyDisplay">-</span>
                            </div>
                        </div>
                        <button class="btn-secondary" id="changePharmacyBtn">
                            <i class="ph ph-building"></i> تغيير
                        </button>
                    </div>

                    <div class="order-table-wrapper">
                        <table class="order-table">
                            <thead>
                                <tr>
                                    <th>المنتج</th>
                                    <th>الكمية</th>
                                    <th>الهدية</th>
                                    <th>ملاحظة</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody id="orderBody"></tbody>
                        </table>
                    </div>

                    <div class="add-item-section">
                        <input type="text" id="newProductInput" placeholder="اكتب المنتج...">
                        <button type="button" id="addProductBtn" class="btn-icon-action">+</button>
                    </div>

                    <div class="order-summary">
                        <textarea id="orderNoteInput" placeholder="ملاحظات..." rows="2"></textarea>
                        <div class="stat-row">
                            <span>المنتجات: <b id="itemCount">0</b></span>
                            <span>الكمية: <b id="totalQty">0</b></span>
                        </div>
                    </div>

                    <div class="order-actions-footer">
                        <button type="button" id="saveDraftBtn" class="btn-secondary-large">حفظ</button>
                        <button type="button" id="submitOrderBtn" class="btn-primary-large">إرسال</button>
                    </div>
                </div>
            </section>

            <section id="orders-screen" class="screen">
                <div class="orders-container">
                    <h3>طلبياتي</h3>
                    <div id="ordersList"></div>
                </div>
            </section>

            <section id="reports-screen" class="screen">
                <div class="reports-container">
                    <h3>التقارير</h3>
                    <div>البيانات محفوظة محلياً</div>
                </div>
            </section>
        </main>
    </div>

    <script src="app-v2.js"></script>
</body>
</html>
