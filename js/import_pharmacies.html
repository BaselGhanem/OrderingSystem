<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تحديث قاعدة بيانات الصيدليات</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; padding: 50px; text-align: center; }
        .btn { padding: 10px 20px; background: #004a99; color: white; border: none; cursor: pointer; border-radius: 5px;}
    </style>
</head>
<body>
    <h2>تحديث قائمة الصيدليات</h2>
    <p>اختر ملف الإكسل الجديد لحذف الصيدليات القديمة وإضافة الجديدة.</p>
    <input type="file" id="excelFile" accept=".xlsx, .xls">
    <br><br>
    <button id="startImportBtn" class="btn">بدء التحديث</button>
    <div id="status" style="margin-top: 20px; font-weight: bold;"></div>

    <script type="module">
        import { db, collection, getDocs, deleteDoc, doc, addDoc } from './js/firebase.js'; // تأكد من مسار ملف firebase.js

        document.getElementById('startImportBtn').onclick = async () => {
            const file = document.getElementById('excelFile').files[0];
            if (!file) return alert("الرجاء اختيار ملف إكسل أولاً");

            const status = document.getElementById('status');
            status.innerText = "جاري قراءة الملف...";

            const reader = new FileReader();
            reader.onload = async (e) => {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                const excelData = XLSX.utils.sheet_to_json(firstSheet);

                if(excelData.length === 0) return alert("الملف فارغ!");

                try {
                    status.innerText = "جاري حذف الصيدليات القديمة (الرجاء الانتظار)...";
                    const snap = await getDocs(collection(db, "pharmacies"));
                    const deletePromises = [];
                    snap.forEach(d => {
                        deletePromises.push(deleteDoc(doc(db, "pharmacies", d.id)));
                    });
                    await Promise.all(deletePromises);

                    status.innerText = `تم الحذف. جاري إضافة ${excelData.length} صيدلية جديدة...`;
                    const addPromises = [];
                    excelData.forEach(row => {
                        if(row.name && row.rep_id) {
                            addPromises.push(addDoc(collection(db, "pharmacies"), {
                                name: String(row.name),
                                rep_id: String(row.rep_id),
                                pharmacy_code: String(row.pharmacy_code || "-")
                            }));
                        }
                    });
                    await Promise.all(addPromises);
                    
                    status.innerText = "تم تحديث قاعدة البيانات بنجاح!";
                    status.style.color = "green";
                } catch (error) {
                    console.error(error);
                    status.innerText = "حدث خطأ أثناء التحديث. راجع الـ Console.";
                    status.style.color = "red";
                }
            };
            reader.readAsArrayBuffer(file);
        };
    </script>
</body>
</html>
