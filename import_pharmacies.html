<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>تحديث قاعدة بيانات الصيدليات - النظام الآمن</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; padding: 50px; text-align: center; background-color: #f1f5f9; color: #1e293b; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 600px; margin: auto; }
        .btn { padding: 12px 25px; background: #004a99; color: white; border: none; cursor: pointer; border-radius: 8px; font-size: 1rem; font-weight: bold; margin-top: 15px; transition: 0.3s;}
        .btn:hover { background: #003a7a; }
        input[type="file"] { padding: 10px; border: 1px solid #ccc; border-radius: 8px; width: 100%; margin-top: 15px; background: #f8fafc;}
        #status { margin-top: 20px; font-size: 1.1rem; font-weight: bold; line-height: 1.6; }
        .info-box { background: #e0f2fe; padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: right; font-size: 0.95rem; line-height: 1.8; border-right: 4px solid #0284c7;}
        .warning-box { background: #fee2e2; color: #991b1b; padding: 12px; border-radius: 8px; font-size: 0.9rem; margin-top: 10px; border: 1px solid #f87171;}
        code { background: #fff; padding: 2px 8px; border-radius: 4px; color: #b91c1c; font-family: monospace; font-weight: bold;}


        /* Responsive safety layer */
        html { width: 100%; max-width: 100%; overflow-x: hidden; -webkit-text-size-adjust: 100%; }
        body { box-sizing: border-box; width: 100%; max-width: 100%; overflow-x: hidden; padding: clamp(12px, 4vw, 50px) !important; }
        *, *::before, *::after { box-sizing: border-box; }
        .container { width: min(100%, 900px) !important; max-width: 100% !important; padding: clamp(16px, 4vw, 30px) !important; }
        h1, h2, h3, p, .info-box, .warning-box, .note-box, #status { overflow-wrap: anywhere; line-height: 1.65; }
        .btn, button, input, select, textarea { max-width: 100%; font-family: 'Cairo', sans-serif; font-size: 16px; }
        .btn, button { min-height: 44px; white-space: normal; line-height: 1.35; }
        input[type="file"] { width: 100% !important; max-width: 100% !important; }
        code { display: inline-block; margin: 2px; }
        @media (max-width: 768px) {
            body { padding: 10px !important; text-align: center; }
            .container { border-radius: 14px !important; box-shadow: 0 4px 14px rgba(0,0,0,.08) !important; }
            .btn, button { width: 100%; margin: 8px 0 !important; }
        }

    </style>
</head>
<body>
    <div class="container">
        <h2 style="color: #004a99;">تحديث قائمة الصيدليات (النسخة الآمنة)</h2>
        
        <div class="info-box">
            <strong>ملاحظة هامة جداً:</strong><br>
            يجب أن يحتوي السطر الأول في ملف الإكسل (الترويسة) على هذه الكلمات باللغة الإنجليزية وبنفس حالة الأحرف:<br>
            <code>Name</code> , <code>rep_id</code> , <code>pharmacy_code</code> , <code>Supervisor</code> , <code>Area</code>
        </div>

        <input type="file" id="excelFile" accept=".xlsx, .xls">
        <br>
        <button id="startImportBtn" class="btn">بدء تحديث قاعدة البيانات</button>
        <div id="status"></div>
    </div>

    <script type="module">
        // تم توحيد الإصدار إلى 10.11.0 ليتطابق مع باقي نظامك
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getFirestore, collection, getDocs, deleteDoc, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDSTrX3Y-jF4k7lBS1AApVHHZXTGmWjk-g",
            authDomain: "dad-ordering-system.firebaseapp.com",
            projectId: "dad-ordering-system",
            storageBucket: "dad-ordering-system.firebasestorage.app",
            messagingSenderId: "43886677849",
            appId: "1:43886677849:web:de5f80c06e1b743c948648"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        function normalizeRowKeys(originalRow) {
            return Object.keys(originalRow || {}).reduce((acc, key) => {
                acc[String(key).trim()] = originalRow[key];
                return acc;
            }, {});
        }

        function makeSafeDocId(value, fallbackPrefix = `pharmacy`) {
            const cleaned = String(value || ``)
                .trim()
                .replace(/[\/\#?]/g, `-`)
                .replace(/\s+/g, `_`)
                .replace(/_+/g, `_`)
                .slice(0, 420);
            return cleaned || `${fallbackPrefix}_${Date.now()}`;
        }

        async function runInChunks(tasks, chunkSize = 100) {
            for (let i = 0; i < tasks.length; i += chunkSize) {
                const chunk = tasks.slice(i, i + chunkSize);
                await Promise.all(chunk.map(task => task()));
            }
        }

        function buildPharmacyImportRows(excelData) {
            const usedIds = new Set();
            const validRows = [];
            const invalidRows = [];

            excelData.forEach((originalRow, index) => {
                const row = normalizeRowKeys(originalRow);
                const name = String(row.Name || row.name || ``).trim();
                const repId = String(row.rep_id || row.Rep_ID || row.repId || ``).trim();
                const pharmacyCode = String(row.pharmacy_code || row.PharmacyCode || row.pharmacyCode || `-`).trim();

                if (!name || !repId) {
                    invalidRows.push(index + 2);
                    return;
                }

                const pharmacyData = {
                    name,
                    rep_id: repId,
                    pharmacy_code: pharmacyCode || `-`,
                    supervisor: String(row.Supervisor || row.supervisor || `-`).trim(),
                    area: String(row.Area || row.area || `-`).trim()
                };

                let docId = makeSafeDocId(`${repId}_${pharmacyData.pharmacy_code}_${name}`, `pharmacy`);
                if (usedIds.has(docId)) docId = `${docId}_${index + 1}`;
                usedIds.add(docId);
                validRows.push({ docId, pharmacyData });
            });

            return { validRows, invalidRows };
        }

        document.getElementById('startImportBtn').onclick = async () => {
            const fileInput = document.getElementById('excelFile');
            const button = document.getElementById('startImportBtn');
            const file = fileInput.files[0];
            if (!file) return alert("الرجاء اختيار ملف إكسل أولاً");

            const status = document.getElementById('status');
            status.innerHTML = "جاري فحص الملف... ⏳";
            status.style.color = "#f59e0b";

            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                    const excelData = XLSX.utils.sheet_to_json(firstSheet, { defval: "" });

                    if(excelData.length === 0) {
                        status.innerHTML = "❌ الملف فارغ أو لا يمكن قراءته! لم يتم حذف أي بيانات.";
                        status.style.color = "red";
                        return;
                    }

                    const { validRows, invalidRows } = buildPharmacyImportRows(excelData);
                    if(validRows.length === 0) {
                        status.innerHTML = `
                            ❌ تم إيقاف العملية لحماية البيانات!<br>
                            <div class="warning-box">
                                لم يتم العثور على أي صيدلية صالحة.<br>
                                تأكد أن السطر الأول يحتوي على <b>Name</b> و <b>rep_id</b> بشكل صحيح.<br>
                                <b>(لم يتم حذف أي بيانات قديمة من النظام)</b>
                            </div>`;
                        status.style.color = "red";
                        return; 
                    }

                    const confirmMessage = `تم العثور على ${validRows.length} صيدلية صالحة من أصل ${excelData.length} صف.
` +
                        `الصفوف غير الصالحة: ${invalidRows.length}.

` +
                        `سيتم أولاً رفع/تحديث الصيدليات الجديدة، وبعد نجاح الرفع سيتم حذف الصيدليات القديمة غير الموجودة في الملف.

هل تريد المتابعة؟`;

                    if (!confirm(confirmMessage)) {
                        status.innerHTML = "تم إلغاء العملية. لم يتم تعديل قاعدة البيانات.";
                        status.style.color = "#64748b";
                        return;
                    }

                    button.disabled = true;
                    fileInput.disabled = true;
                    button.innerText = "جاري التحديث...";

                    status.innerHTML = `جاري رفع/تحديث ${validRows.length} صيدلية قبل حذف القديم... ⏳`;
                    status.style.color = "#004a99";

                    const newDocIds = new Set(validRows.map(row => row.docId));
                    const writeTasks = validRows.map(row => () => setDoc(doc(db, "pharmacies", row.docId), row.pharmacyData));
                    await runInChunks(writeTasks, 100);

                    status.innerHTML = "تم رفع الصيدليات الجديدة بنجاح. جاري تنظيف الصيدليات القديمة غير الموجودة في الملف...";
                    const snap = await getDocs(collection(db, "pharmacies"));
                    const deleteTasks = [];
                    snap.forEach(existingDoc => {
                        if (!newDocIds.has(existingDoc.id)) {
                            deleteTasks.push(() => deleteDoc(doc(db, "pharmacies", existingDoc.id)));
                        }
                    });
                    await runInChunks(deleteTasks, 100);

                    status.innerHTML = `✅ تم التحديث بنجاح!<br>تم رفع/تحديث (${validRows.length}) صيدلية، وحذف (${deleteTasks.length}) سجل قديم غير موجود في الملف.`;
                    status.style.color = "#10b981";
                    fileInput.value = "";
                } catch (error) {
                    console.error("Error during import:", error);
                    status.innerHTML = "❌ حدث خطأ غير متوقع أثناء معالجة البيانات. إذا ظهر الخطأ قبل مرحلة الحذف فلن تكون البيانات القديمة قد حُذفت.";
                    status.style.color = "red";
                } finally {
                    button.disabled = false;
                    fileInput.disabled = false;
                    button.innerText = "بدء تحديث قاعدة البيانات";
                }
            };
            reader.readAsArrayBuffer(file);
        };
    </script>
</body>
</html>
